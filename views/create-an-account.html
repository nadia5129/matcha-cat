<!DOCTYPE html>
<!-- Kate-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account</title>
    <!-- Link to CSS file -->
    <link rel="stylesheet" href="/public/css/style.css">
</head>
<body>
    <!--header-->
     <header class="site-header">
        <h1> Matcha Cat Cafe </h1>
    </header>

    <!--create an account form-->
    <main class="main-nav">
    <section id="create-an-account-section" class="form-section">
            <h2>Create an Account</h2>
        <form id="create-an-account-form" class="account-form" action ="/submit" method="POST" novalidate>
            <div class="form-field">
                <label for="username">Username:</label>
                <input type="text" id="username" name="username" required>
                <span id="username-error" class="error-message"></span>
            </div>

            <div class="form-field">
                <label for="first-name">First Name:</label>
                <input type="text" id="first-name" name="first-name" required>
                <span id="first-name-error" class="error-message"></span>
            </div>

            <div class="form-field">
                <label for="last-name">Last Name:</label>
                <input type="text" id="last-name" name="last-name" required>
                <span id="last-name-error" class="error-message"></span>
            </div>

            <div class="form-field">
                <label for="phone">Phone Number:</label>
                <input type="tel" id="phone" name="phone" required>
                <span id="phone-error" class="error-message"></span>
            </div>
            
            <div class="form-field">
                <label for ="birthday">Birthday:</label>
                <input type="date" id="birthday" name="birthday" required>
                <span id="birthday-error" class="error-message"></span>
            </div>

            <div class="form-field">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
                <span id="email-error" class="error-message"></span>
            </div>

            <div class="form-field">
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required>
                <span id="password-error" class="error-message"></span>
            </div>


            <button type="submit">Create Account</button>
        </form>

    </section>
    </main>

<!--nav bar-->
   <nav id="main-nav" class="main-nav">

   <footer class="site-footer">
    <p> Matcha Cat Cafe • Seattle, WA </p>

</body>
</html>
